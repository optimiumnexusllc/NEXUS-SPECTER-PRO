# NEXUS SPECTER PRO — PostgreSQL StatefulSet
# by OPTIMIUM NEXUS LLC
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nsp-postgres
  namespace: nexus-specter-pro
spec:
  serviceName: nsp-postgres
  replicas: 1
  selector:
    matchLabels:
      app: nsp-postgres
  template:
    metadata:
      labels:
        app: nsp-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name:  POSTGRES_DB
              value: nexus_specter
            - name:  POSTGRES_USER
              value: nsp
            - name:  POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nsp-secrets
                  key:  POSTGRES_PASSWORD
          volumeMounts:
            - name:      nsp-postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu:    "250m"
            limits:
              memory: "1Gi"
              cpu:    "500m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "nsp", "-d", "nexus_specter"]
            initialDelaySeconds: 30
            periodSeconds:       10
  volumeClaimTemplates:
    - metadata:
        name: nsp-postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nsp-postgres
  namespace: nexus-specter-pro
spec:
  selector:
    app: nsp-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
