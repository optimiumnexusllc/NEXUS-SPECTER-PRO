# NEXUS SPECTER PRO — Redis Deployment
# by OPTIMIUM NEXUS LLC
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nsp-redis
  namespace: nexus-specter-pro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nsp-redis
  template:
    metadata:
      labels:
        app: nsp-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--appendonly"
            - "yes"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nsp-secrets
                  key:  REDIS_PASSWORD
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu:    "100m"
            limits:
              memory: "512Mi"
              cpu:    "250m"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds:       5
---
apiVersion: v1
kind: Service
metadata:
  name: nsp-redis
  namespace: nexus-specter-pro
spec:
  selector:
    app: nsp-redis
  ports:
    - port: 6379
      targetPort: 6379
