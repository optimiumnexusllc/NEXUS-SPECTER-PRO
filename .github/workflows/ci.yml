name: NEXUS SPECTER PRO — CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Type check
        run: mypy nsp/ --ignore-missing-imports

  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Bandit (Python security linter)
        run: |
          pip install bandit
          bandit -r nsp/ -f json -o bandit-report.json || true
      - name: Upload security report
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json

  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t nexus-specter-pro:test .
      - name: Test container
        run: docker run --rm nexus-specter-pro:test --version
